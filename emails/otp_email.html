<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mã OTP xác thực</title>
</head>
<body style="margin:0;padding:0;background:#f5f7fb;font-family:Arial,sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f7fb;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="640" cellspacing="0" cellpadding="0" style="max-width:640px;width:100%;background:#ffffff;border-radius:18px;overflow:hidden;">
          <tr>
            <td style="background:linear-gradient(135deg,#2563eb,#0f172a);padding:28px 32px;color:#ffffff;">
              <div style="font-size:14px;opacity:.85;">{{ company_name }}</div>
              <h1 style="margin:8px 0 0;font-size:28px;line-height:1.2;">Mã OTP xác thực</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              <p style="margin:0 0 16px;font-size:16px;line-height:1.7;">Bạn vừa yêu cầu mã OTP cho chức năng <strong>{{ purpose }}</strong>.</p>
              <div style="margin:24px 0;padding:24px;border:1px dashed #93c5fd;border-radius:16px;background:#eff6ff;text-align:center;">
                <div style="font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#2563eb;">Mã OTP của bạn</div>
                <div style="margin-top:12px;font-size:36px;font-weight:700;letter-spacing:8px;color:#0f172a;">{{ code }}</div>
              </div>
              <p style="margin:0 0 12px;font-size:15px;line-height:1.7;">Mã có hiệu lực trong <strong>{{ expire_minutes }} phút</strong>.</p>
              <p style="margin:0;font-size:15px;line-height:1.7;color:#475569;">Nếu bạn không thực hiện yêu cầu này, vui lòng bỏ qua email.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px;background:#f8fafc;border-top:1px solid #e5e7eb;font-size:13px;color:#64748b;">
              Hỗ trợ: {{ support_email }}
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
